name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          echo "Build succeeded"

      - name: Ad-hoc sign binary
        run: |
          BINARY=".build/apple/Products/Release/aura-cli"
          codesign --sign - --force --options runtime "$BINARY"
          echo "Signed: $(codesign -dv "$BINARY" 2>&1 | grep Authority || echo 'ad-hoc')"

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BINARY=".build/apple/Products/Release/aura-cli"
          TARBALL="aura-cli-${VERSION}-macos.tar.gz"
          tar -czf "$TARBALL" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo ""
          echo "============================================"
          echo "  Artifact : $TARBALL"
          echo "  SHA256   : $SHA256"
          echo "============================================"
          echo ""
          echo "Update Formula/aura-cli.rb in homebrew-tap with:"
          echo "  url \"https://github.com/ihomway/aura-cli/releases/download/${VERSION}/${TARBALL}\""
          echo "  sha256 \"${SHA256}\""

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true
